services:
  marketing-bot:
    build: .
    container_name: marketing-bot
    restart: unless-stopped
    env_file: .env
    environment:
      DATA_DIR: /data
      # jsonl-логи и SQLite «Мои заявки» — на volume, переживают пересборку контейнера
      REQUESTS_DB_PATH: /data/requests.db
    volumes:
      - ./data:/data
    networks:
      - platform
    # HTTP API доступен другим контейнерам сети как marketing-bot:8080.
    # expose, а не ports — наружу порт НЕ публикуется, только внутри сети деплоя.
    expose:
      - "8080"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    # Бот работает через long polling — порты наружу не публикуем, вебхук не нужен.

networks:
  platform:
    external: true
    name: deploy_default
